title: "Subaru EV Decision Matrix"
date: "2026-05-06"
abstract: "A personal decision matrix comparing the 2026 Subaru Uncharted Sport/GT, Trailseeker, and Solterra EVs against a Michigan-winter, 3-people-max use case. Weighs AWD performance, range, cargo, bike-rack compatibility, and price to land on a final recommendation for upgrading from a VW ID.4."
location: "Lansing, MI"
tags: ["electric vehicles", "subaru", "decision matrix", "personal"]
